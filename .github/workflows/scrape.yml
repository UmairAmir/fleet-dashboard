name: Scrape fleet data

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape-cron
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('scraper/requirements.txt') }}

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          TRACK_USERNAME: ${{ secrets.TRACK_USERNAME }}
          TRACK_PASSWORD: ${{ secrets.TRACK_PASSWORD }}
          OUTPUT_PATH: ${{ github.workspace }}/out/latest.json
        run: |
          mkdir -p "$(dirname "$OUTPUT_PATH")"
          python scraper/scrape.py

      - name: Push snapshot to data branch
        run: |
          OUTPUT_FILE="${{ github.workspace }}/out/latest.json"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          rm -rf /tmp/data-branch
          mkdir /tmp/data-branch
          cd /tmp/data-branch
          git init -q
          git checkout -q -b data
          cp "$OUTPUT_FILE" latest.json
          echo '{"ignoreCommand": "exit 0"}' > vercel.json
          git add latest.json vercel.json
          git commit -q -m "Update fleet snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -q --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" data:data
